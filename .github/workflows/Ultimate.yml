name: V43-MODAL-GPU-60FPS
on: workflow_dispatch

jobs:
  launch-gpu:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Install Modal & Bridge
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          pip install modal
          cat <<EOF > modal_run.py
          import modal
          import subprocess

          # We combine everything into one 'run_commands' block for speed
          image = (
              modal.Image.from_registry("nvidia/cuda:12.2.0-base-ubuntu22.04")
              .run_commands(
                  "apt-get update",
                  "DEBIAN_FRONTEND=noninteractive apt-get install -y wget curl libpulse0 xserver-xorg-video-dummy libevdev2 libx11-6",
                  "wget -q https://github.com/LizardByte/Sunshine/releases/download/v2024.1112.152857/sunshine-ubuntu-22.04-amd64.deb",
                  "apt-get install -y ./sunshine-ubuntu-22.04-amd64.deb",
                  "rm sunshine-ubuntu-22.04-amd64.deb"
              )
          )

          app = modal.App("max-fps-gaming")

          @app.function(gpu="T4", image=image, timeout=3600)
          def start_gaming():
              print("🚀 GPU STATUS: TESLA T4 ONLINE")
              print("------------------------------------------")
              print("PASSWORD: admin")
              print("------------------------------------------")
              
              # Run sunshine in the background
              subprocess.run(["sunshine", "--password", "admin"])

          if __name__ == "__main__":
              with modal.enable_output():
                  with app.run():
                      start_gaming.remote()
          EOF
          
          python modal_run.py
