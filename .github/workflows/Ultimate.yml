name: V43-MODAL-GPU-60FPS
on: workflow_dispatch

jobs:
  launch-gpu:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Install Modal & Bridge
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          pip install modal
          cat <<EOF > modal_run.py
          import modal
          import subprocess

          # Use a stable base and update it before installing tools
          image = (
              modal.Image.from_registry("nvidia/cuda:12.2.0-base-ubuntu22.04")
              .run_commands("apt-get update", "apt-get install -y sunshine curl libpulse0 xserver-xorg-video-dummy")
          )

          app = modal.App("max-fps-gaming")

          @app.function(gpu="T4", image=image, timeout=3600)
          def start_gaming():
              print("🚀 GPU STATUS: TESLA T4 ONLINE")
              print("------------------------------------------")
              print("PASSWORD: admin")
              print("------------------------------------------")
              
              # Force Sunshine to run
              subprocess.run(["sunshine", "--password", "admin"])

          if __name__ == "__main__":
              # enable_output() helps us see the install progress
              with modal.enable_output():
                  with app.run():
                      start_gaming.remote()
          EOF
          
          python modal_run.py
