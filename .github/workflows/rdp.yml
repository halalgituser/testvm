name: Ultimate-Gaming-VM-V41-MAX-FPS
on: workflow_dispatch

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: 1. Keep-Alive Heartbeat
        shell: bash
        run: |
          # This loop prevents the 'Runtime Disconnected' error
          while true; do
            echo "Heartbeat Pulse: $(date)"
            # Small activity to trick Google's idle detection
            ls /content > /dev/null
            sleep 60
          done &
          
      - name: 2. Gaming Performance Tweaks
        shell: pwsh
        run: |
          # Force High Performance
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          # Enable Hardware Acceleration
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers" /v HwSchMode /t REG_DWORD /d 2 /f
          Write-Host "VM Optimization Complete."
