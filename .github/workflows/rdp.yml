name: Ultimate-Gaming-VM-V41-MOONLIGHT
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Network & Performance Setup
        shell: pwsh
        run: |
          # Install Tailscale (To connect your phone to the VM)
          curl.exe -L -o tailscale-setup.exe https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe
          Start-Process ./tailscale-setup.exe -ArgumentList "/S" -Wait
          
          # FORCE High Performance Power Plan
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

      - name: 2. Install Sunshine (Fixed Download)
        shell: pwsh
        run: |
          # 1. Download Sunshine (Using direct release link)
          Write-Host "Downloading Sunshine..."
          $sunshineUrl = "https://github.com/LizardByte/Sunshine/releases/download/v0.21.0/sunshine-windows-x64-installer.exe"
          curl.exe -L -o sunshine.exe $sunshineUrl
          
          # Check if file is valid before installing
          if ((Get-Item sunshine.exe).Length -lt 1000000) { 
            Write-Error "Sunshine download failed (file too small). Check URL."
            exit 1 
          }
          
          Write-Host "Installing Sunshine..."
          Start-Process ./sunshine.exe -ArgumentList "/S" -Wait
          
          # 2. Download ViGEmBus (For Controller Support)
          Write-Host "Downloading ViGEmBus..."
          $vigemUrl = "https://github.com/ViGEm/ViGEmBus/releases/download/v1.21.442.0/ViGEmBus_Setup_1.21.442.0.msi"
          curl.exe -L -o vigembus.msi $vigemUrl
          Start-Process msiexec.exe -ArgumentList "/i vigembus.msi /quiet /norestart" -Wait


      - name: 3. Start Services & Stay Alive
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Login to Tailscale
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $env:TS_KEY --hostname=github-vm
          
          # Start Sunshine in the background
          Start-Process "C:\Program Files\Sunshine\sunshine.exe" -WindowStyle Hidden
          
          Write-Host "✅ VM is ONLINE on Tailscale as 'github-vm'"
          Write-Host "🔗 Open Sunshine Dashboard on your phone: https://github-vm:47990"
          
          # Keep the VM running for 6 hours
          while ($true) { Start-Sleep -Seconds 3600 }
