name: Ultimate-Gaming-VM-V41-MAX-FPS
on: workflow_dispatch

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: 1. Start AnyDesk & Monitor VM
        shell: bash
        run: |
          echo "VM is booting on Colab GPU..."
          echo "Please connect via AnyDesk once the ID appears in the Colab output."
          
          # This keeps the GitHub action alive for 6 hours
          for i in {1..360}; do
            echo "Keep-alive: Minute $i"
            sleep 60
          done
