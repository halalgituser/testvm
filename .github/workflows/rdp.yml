name: Ultimate-Gaming-VM-V42-MOONLIGHT
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Unlock Maximum Performance
        shell: pwsh
        run: |
          # Create folders
          New-Item -Path "C:\GamingVM\Backup" -ItemType Directory -Force
          New-Item -Path "C:\GamingVM\Drivers" -ItemType Directory -Force
          
          # FORCE High Performance Power Plan
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          
          # Disable animations for lower encoding latency
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v UserPreferencesMask /t REG_BINARY /d 9012038010000000 /f
          
          # Install Visual C++ (Needed for Sunshine)
          curl.exe -L -o vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe
          Start-Process ./vc_redist.x64.exe -ArgumentList "/install /quiet /norestart" -Wait

      - name: 2. Install Tailscale & Virtual Display
        shell: pwsh
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Install Tailscale
          curl.exe -L -o tailscale-setup.exe https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe
          Start-Process ./tailscale-setup.exe -ArgumentList "/S" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $env:TS_KEY --hostname=github-gaming-vm
          
          # Install Virtual Display Driver (Prevents Black Screen in Moonlight)
          # We use a signed driver package for easy install
          curl.exe -L -o VDD.zip https://github.com/itsmikethetech/Virtual-Display-Driver/releases/download/v25.05.03/VDD.Control.25.7.23.zip
          Expand-Archive VDD.zip -DestinationPath C:\GamingVM\Drivers\VDD
          # Note: Manual driver install usually requires a reboot; we'll trigger the service
          Write-Host "Virtual Display files ready in C:\GamingVM\Drivers\VDD"

      - name: 3. Install Sunshine & ViGEmBus
        shell: pwsh
        run: |
          # Install Sunshine (The Host Server)
          curl.exe -L -o sunshine.exe https://github.com/LizardByte/Sunshine/releases/latest/download/sunshine-windows-x64-installer.exe
          Start-Process ./sunshine.exe -ArgumentList "/S" -Wait
          
          # Install ViGEmBus (Required for Controller support on your phone)
          curl.exe -L -o vigembus.msi https://github.com/ViGEm/ViGEmBus/releases/download/v1.21.442.0/ViGEmBus_Setup_1.21.442.0.msi
          Start-Process msiexec.exe -ArgumentList "/i vigembus.msi /quiet /norestart" -Wait

      - name: 4. Launch & Stay Alive
        shell: pwsh
        run: |
          # Start Sunshine Service
          Start-Process "C:\Program Files\Sunshine\sunshine.exe" -WindowStyle Hidden
          
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "----------------------------------------------"
          Write-Host "✅ VM IS ONLINE!"
          Write-Host "📍 TAILSCALE IP: $tsIP"
          Write-Host "🎮 1. Open Moonlight on your phone"
          Write-Host "🎮 2. Add PC manually using IP: $tsIP"
          Write-Host "🎮 3. Go to https://$($tsIP):47990 on phone to PAIR PIN"
          Write-Host "----------------------------------------------"
          
          while ($true) { Start-Sleep -Seconds 3600 }
          
