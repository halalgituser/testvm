name: Ultimate-Gaming-VM-V41-MAX-FPS
on: workflow_dispatch

jobs:
  build:
    runs-on: self-hosted  # Connects to your Colab GPU
    steps:
      - name: 1. Keep Server Alive
        run: |
          echo "VM is running on Colab GPU."
          echo "Connect via AnyDesk using the ID shown in your Colab cell."
          # This loop keeps the connection active for 6 hours
          for i in {1..360}; do
            echo "Status: Active - Minute $i"
            sleep 60
          done
