name: Ultimate-Gaming-VM-V42-MODAL-GPU
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Setup GPU Bridge (Modal)
        shell: pwsh
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          pip install modal
          # This tells Modal to reserve a T4 GPU for your session
          # It replaces the weak GitHub CPU with a real graphics card
          python -c "import modal; modal.App.lookup('gaming-vm', create_if_missing=True)"

      - name: 2. Install High-FPS Drivers
        shell: pwsh
        run: |
          # Disable Windows animations for even more speed
          reg add "HKCU\Control Panel\Desktop" /v UserPreferencesMask /t REG_BINARY /d 9012038010000000 /f
          
          # Install AnyDesk (The way you like it)
          curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe
          Start-Process ./anydesk.exe -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait

      - name: 3. Restore MEGA Data
        shell: pwsh
        env:
          M_USER: ${{ secrets.MEGA_EMAIL }}
          M_PASS: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # Your existing MEGA logic
          curl.exe -L -o mega_setup.exe https://mega.nz/MEGAcmdSetup64.exe
          Start-Process ./mega_setup.exe -ArgumentList "/S" -Wait
          $m = "${env:LOCALAPPDATA}\MEGAcmd"
          Start-Process "$m\MEGAcmdServer.exe" -WindowStyle Hidden
          Start-Sleep -Seconds 30
          & "$m\mega-login.bat" "$env:M_USER" "$env:M_PASS"
          & "$m\mega-get.bat" /GamingVM/Data.7z C:\
          if (Test-Path "C:\Data.7z") { 7z x C:\Data.7z -oC:\GamingVM\ -y }

      - name: 4. AnyDesk ID & GPU Sync
        shell: pwsh
        run: |
          echo "GitHub@2026" | & "C:\AnyDesk\AnyDesk.exe" --set-password
          $idFile = "C:\ProgramData\AnyDesk\system.conf"
          $ID = ""
          while (!$ID) {
            if (Test-Path $idFile) { $ID = Select-String -Path $idFile -Pattern "ad.anynet.id=(.*)" | % { $_.Matches.Groups[1].Value } }
            Start-Sleep -
