name: Ultimate-Gaming-VM-V41-REAL-8-PLUS
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Hardware Overclock & Debloat
        shell: pwsh
        run: |
          $dirs = "C:\GamingVM", "C:\GamingVM\Backup", "C:\GamingVM\Startup"
          foreach ($dir in $dirs) { New-Item -Path $dir -ItemType Directory -Force }

          # CPU Performance Optimization
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          powercfg /setacvalueindex scheme_current sub_processor perfboostmode 4
          
          # Graphics & Registry Tweaks
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\GraphicsDrivers" /v HwSchMode /t REG_DWORD /d 2 /f
          reg add "HKCU\Software\Microsoft\DirectX\UserGpuPreferences" /v DirectxUserGlobalGpuPreference /t REG_SZ /d "GpuPreference=2;" /f

          # Disable background 'Resource Stealers'
          Set-MpPreference -DisableRealtimeMonitoring $true
          Stop-Service -Name "SysMain" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "SysMain" -StartupType Disabled

      - name: 2. Core-Level App Injection
        shell: pwsh
        run: |
          # Install AnyDesk
          curl.exe -L -o anydesk.exe https://download.anydesk.com/AnyDesk.exe
          # Use --silent and wait for the installer to finish its job
          Start-Process ./anydesk.exe -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait
          
          # --- FIXED: WAIT FOR FILE TO EXIST ---
          $anydeskPath = "C:\AnyDesk\AnyDesk.exe"
          Write-Host "Waiting for AnyDesk.exe to appear at $anydeskPath..." -ForegroundColor Cyan
          $timeout = 0
          while (!(Test-Path $anydeskPath) -and $timeout -lt 30) {
              Start-Sleep -Seconds 2
              $timeout++
          }

          if (Test-Path $anydeskPath) {
              Write-Host "AnyDesk installed successfully." -ForegroundColor Green
              # Set Priority
              $p = Get-Process AnyDesk -ErrorAction SilentlyContinue
              if ($p) { $p.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::RealTime }
          } else {
              Write-Host "Error: AnyDesk.exe not found after 60 seconds." -ForegroundColor Red
              exit 1
          }

      - name: 3. Connection & Stay Alive
        shell: pwsh
        run: |
          $anydeskPath = "C:\AnyDesk\AnyDesk.exe"
          # Set Password using the verified path
          echo "GitHub@2026" | & $anydeskPath --set-password
          
          $idFile = "C:\ProgramData\AnyDesk\system.conf"
          $ID = ""
          Write-Host "Fetching AnyDesk ID..." -ForegroundColor Cyan
          while (!$ID) {
            if (Test-Path $idFile) { 
                $ID = Select-String -Path $idFile -Pattern "ad.anynet.id=(.*)" | ForEach-Object { $_.Matches.Groups[1].Value }
            }
            Start-Sleep -Seconds 5
          }
          
          Write-Host "--- ACTUAL HARDWARE SPECS ---" -ForegroundColor Green
          Get-CimInstance Win32_Processor | Select-Object Name, MaxClockSpeed
          Write-Host "ANYDESK ID: $ID" -ForegroundColor White
          Write-Host "PASSWORD: GitHub@2026" -ForegroundColor White
          
          while ($true) { Start-Sleep -Seconds 3600 }
